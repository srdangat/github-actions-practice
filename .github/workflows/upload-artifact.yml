name: upload artifact
on:
  workflow_dispatch:
jobs:
  generate-reports:
    runs-on: ubuntu-latest
    steps:
      - name: Generate report
        run: |
          mkdir reports
          echo "Test run successful" > reports/test-report.txt
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: reports/test-report.txt
