name: docker cicd

on:
  push:
   branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # - name: Build docker image & Tag
      #   uses: docker/build-push-action@v6
      #   with:
      #     context: .
      #     push: false
      #     tags: webapp:latest
            
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKE_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Set short SHA using slice
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Build, tag & push to Docker Hub
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/webapp:latest
            ${{ secrets.DOCKER_USERNAME }}/webapp:sha-${{ env.SHORT_SHA }}