name: multi-job dependencies

on:
  workflow_dispatch:


jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Build
        run: echo "Building the app....."

  test:
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Test
        run: echo "Running tests...."

  deploy:
      runs-on: ubuntu-latest
      needs: [test]
      steps:
        - name: Deploy
          run: echo "Deploying...."
