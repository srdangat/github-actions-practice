name: github runner demo

on:
  workflow_dispatch: 


jobs:
  ubuntu-job:
    runs-on: ubuntu-latest
    steps:
      - name: print ubuntu runner info
        run: |
          echo "Opearting System:"
          uname -a
          echo "Hostname:"
          hostname
          echo "Current User:"
          whomai


  windows-job:
    runs-on: windows-latest
    steps:
      - name: print windows runner info
        run: |
          echo "Opearting System:"
          winver
          echo "Hostname:"
          hostname
          echo "Current User:"
          whomai
          
  macos-job:
     runs-on: macos-latest
     steps:
       - name: print macos runner info
         run: |
           echo "Operating system:"
           system_profiler SPSoftwareDataType
           echo "Hostname:"
           hostname
           echo "Current User:"
           whoami
